# Flet App Cloud Build Configuration

app_name: DataLinkAnalyzer
app_name_short: DataLinkAnalyzer
app_version: "1.0.0"
app_id: com.datalinkanalyzer.app
app_description: "多表数据关联分析平台"

android:
  permissions:
    - READ_EXTERNAL_STORAGE
    - WRITE_EXTERNAL_STORAGE
    - MANAGE_EXTERNAL_STORAGE
    - INTERNET
    - ACCESS_NETWORK_STATE
  orientation: portrait
  theme_color: "#2196F3"

build:
  target: android
  arch: arm64
  debug: true

packages:
  - flet>=0.21.0
  - pandas>=2.0.0
  - openpyxl>=3.1.0

entry: main.py
