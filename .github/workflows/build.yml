name: Build Android APK

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Flet
      run: |
        pip install flet pandas openpyxl

    - name: Build Android APK
      run: |
        flet build android -y

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: DataLinkAnalyzer-debug.apk
        path: build/android/app/build/outputs/apk/debug/app-debug.apk